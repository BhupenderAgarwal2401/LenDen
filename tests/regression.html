<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LenDen Regression Tests</title>
  <style>
    body{font-family:Arial,sans-serif;padding:16px;max-width:900px;margin:0 auto;}
    .ok{color:#0a7d24}.bad{color:#c81d25}
    .card{border:1px solid #ddd;border-radius:8px;padding:12px;margin:10px 0}
    code{background:#f3f3f3;padding:2px 4px;border-radius:4px}
  </style>
</head>
<body>
  <h2>LenDen Regression Tests</h2>
  <p>Use this page after each deployment. It does not ship as part of install shortcuts/app shell.</p>
  <button onclick="runRegressionTests()">Run Tests</button>
  <div id="results" class="card" style="margin-top:12px">Not run yet.</div>

  <!-- Minimal stubs required by app.js boot -->
  <div id="toast"></div>
  <div id="pin-screen" style="display:none"></div>
  <div id="app"></div>
  <div id="pin-hint"></div>
  <div id="pin-error"></div>
  <div id="bio-unlock-btn"></div>
  <div id="d0"></div><div id="d1"></div><div id="d2"></div><div id="d3"></div>
  <div id="theme-btn"></div>
  <input id="dark-toggle" type="checkbox" />
  <input id="bio-toggle" type="checkbox" />
  <div id="d-recv"></div><div id="d-recv-c"></div><div id="d-owe"></div><div id="d-owe-c"></div><div id="d-lent"></div><div id="d-disc"></div><div id="dash-recent"></div>
  <div id="install-banner-slot"></div>
  <div id="update-banner-slot"></div>
  <div id="overlay"></div>

  <script src="../js/app.js"></script>
  <script src="./regression.js"></script>
</body>
</html>
